<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="My Movies"/>
<title>My Movie Collection</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
.header{background:#111;padding:16px 16px 0;position:sticky;top:0;z-index:100;border-bottom:1px solid #222}
.header h1{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:12px;color:#fff}
.tabs{display:flex;gap:0}
.tab{flex:1;padding:10px 0;text-align:center;font-size:14px;font-weight:600;color:#666;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#fff;border-bottom-color:#e50914}
.search-wrap{padding:10px 16px;background:#0a0a0a;position:sticky;top:107px;z-index:99}
.search-wrap input{width:100%;padding:10px 16px;font-size:15px;border:none;border-radius:8px;background:#1e1e1e;color:#fff;outline:none}
.search-wrap input::placeholder{color:#555}
#stats{font-size:12px;color:#555;padding:2px 16px 6px}
.section-header{font-size:11px;font-weight:700;color:#e50914;letter-spacing:0.15em;text-transform:uppercase;padding:14px 16px 6px;background:#0a0a0a}
.movie-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 16px 4px}
.movie-card{cursor:pointer;border-radius:6px;overflow:hidden;background:#1a1a1a;position:relative;aspect-ratio:2/3;-webkit-tap-highlight-color:transparent}
.movie-card:active{opacity:0.8}
.movie-card img{width:100%;height:100%;object-fit:cover;display:block}
.placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a1a;padding:8px;text-align:center}
.placeholder .abbr{font-size:20px;font-weight:800;color:#333;margin-bottom:4px}
.placeholder .ptitle{font-size:8px;color:#444;line-height:1.3}
.num-badge{position:absolute;top:4px;left:4px;background:rgba(0,0,0,0.8);color:#888;font-size:9px;font-weight:700;padding:2px 4px;border-radius:3px}
.tab-content{display:none}
.tab-content.active{display:block}
.no-results{padding:60px 16px;text-align:center;color:#444;font-size:15px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:1000;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
.modal-overlay.open{display:block}
.modal{max-width:500px;margin:0 auto}
.modal-backdrop-wrap{position:relative;width:100%;height:240px;overflow:hidden;background:#1a1a1a}
.modal-backdrop-wrap img{width:100%;height:100%;object-fit:cover;display:block;opacity:0.7}
.modal-close{position:fixed;top:14px;right:14px;width:32px;height:32px;background:rgba(0,0,0,0.8);border:1px solid #444;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:1001;color:#fff;font-size:14px;font-weight:700}
.modal-body{padding:0 16px 50px}
.modal-poster-row{display:flex;gap:14px;align-items:flex-start;margin-top:-50px;margin-bottom:14px}
.modal-poster{width:85px;height:127px;border-radius:7px;overflow:hidden;flex-shrink:0;box-shadow:0 6px 24px rgba(0,0,0,0.7);background:#1a1a1a}
.modal-poster img{width:100%;height:100%;object-fit:cover}
.modal-info{padding-top:54px;flex:1}
.modal-title{font-size:19px;font-weight:800;line-height:1.2;margin-bottom:4px}
.modal-year{font-size:13px;color:#888;margin-bottom:6px}
.modal-score{display:inline-flex;align-items:center;gap:4px;background:#e50914;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px}
.modal-overview{font-size:14px;color:#bbb;line-height:1.7;margin-bottom:14px;margin-top:14px}
.modal-tags{display:flex;gap:6px;flex-wrap:wrap}
.modal-tag{background:#1e1e1e;color:#888;font-size:11px;padding:4px 10px;border-radius:20px}
</style>
</head>
<body>

<div class="header">
  <h1>My Movie Collection</h1>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('dvd')">DVD Collection</div>
    <div class="tab" onclick="switchTab('digital')">Digital</div>
  </div>
</div>

<div class="search-wrap">
  <input type="search" id="search" placeholder="Search..." oninput="filterList()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
</div>
<div id="stats"></div>

<div id="tab-dvd" class="tab-content active"><div id="list-dvd"></div></div>
<div id="tab-digital" class="tab-content"><div id="list-digital"></div></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-close" onclick="closeModal()">X</div>
    <div class="modal-backdrop-wrap"><img id="modal-backdrop" src="" alt=""/></div>
    <div class="modal-body">
      <div class="modal-poster-row">
        <div class="modal-poster" id="modal-poster"></div>
        <div class="modal-info">
          <div class="modal-title" id="modal-title"></div>
          <div class="modal-year" id="modal-year"></div>
          <div class="modal-score" id="modal-score"></div>
        </div>
      </div>
      <div class="modal-overview" id="modal-overview">Loading...</div>
      <div class="modal-tags" id="modal-tags"></div>
    </div>
  </div>
</div>

<script>
var API = "8670d5dc76f371b2ad77f98e626dfba2";
var IMG = "https://image.tmdb.org/t/p/";

var DVD = ["11.22.63","21","21 and Over","22 Jump Street","2012","30 Minutes or Less","50 First Dates","A Christmas Story","A Fistful of Dollars","A Million Ways to Die in the West","A Walk Among the Tombstones","Abraham Lincoln Vampire Hunter","Ad Astra","After Earth","Alien","Alien Covenant","Alien vs Predator","Aliens","American Gangster","American History X","American Hustle","American Pie","Annihilation","Ant-Man and the Wasp","Apollo 18","Aquaman","Austin Powers Goldmember","Avengers Age of Ultron","Avengers Endgame","Avatar","Batman vs Superman","Battleship","Baywatch","Bee Movie","Big Trouble in Little China","Bill and Teds Bogus Journey","Bill and Teds Excellent Adventure","Black Panther","Blade Runner","Bleeding Steel","Blended","Bloodshot","Blow","Boondock Saints","Brave","Bumblebee","Captain America The First Avenger","Captain America The Winter Soldier","Cast Away","Central Intelligence","Chicago","Chips","Civil War","Clash of the Titans","Cold Mountain","Collateral","Collateral Damage","Conan the Barbarian","Conan the Destroyer","Constantine","Contraband","Dawn of the Dead","Deadpool 2","Deliver Us","Despicable Me","Despicable Me 2","Despicable Me 3","Die Hard","Die Hard with a Vengeance","Dirty Grandpa","Divergent","Doctor Strange","Dolittle","Dragonheart","Due Date","Edward Scissorhands","Enemy of the State","Escape Plan","Eurotrip","Everything Must Go","Fantastic Beasts and Where to Find Them","Fantastic Beasts The Crimes of Grindelwald","Fast 5","Fast 6","Fast and Furious Hobbs and Shaw","Fast Times at Ridgemont High","Faster","Fear and Loathing in Las Vegas","Fight Club","First Man","Full Metal Jacket","Furious 7","G.I. Joe","Game Night","Gamer","Get Hard","Ghost in the Shell","Ghost Protocol","Godzilla","Gone in 60 Seconds","Goodfellas","Goon","Gravity","Groundhog Day","Grown Ups 2","Guardians of the Galaxy Vol 2","Hannibal","Happy Feet","Heartbreak Ridge","Hell Ride","Hercules","Herbie","Hitch","Homefront","Horrible Bosses","I Am Legend","Ice Age","Ice Age The Meltdown","Identity Thief","Immortals","Independence Day","Insurgent","Iron Man 3","J. Edgar","Jack Reacher","Jack Reacher Never Go Back","Jason Bourne","Jayne Mansfields Car","Jeepers Creepers","Joe Dirt","John Wick","John Wick 2","John Wick 3","Jonah Hex","Jumanji","Jumanji Welcome to the Jungle","Jurassic World","Just Friends","Justice League","JW Fallen Kingdom","Kick-Ass","Kick-Ass 2","Kill Bill Vol 1","Kill Bill Vol 2","Kingsman Secret Service","Kiss the Girls","Last Knights","Leatherheads","Lethal Weapon","Lethal Weapon 2","Lethal Weapon 3","Lethal Weapon 4","Little Nicky","Logan","Lone Survivor","Mad Max Fury Road","Masterminds","Mechanic Resurrection","Men in Black","Million Dollar Baby","Mission Impossible","Mission Impossible Fallout","Mission Impossible Rogue Nation","Mr and Mrs Smith","Mrs Doubtfire","My Cousin Vinny","Nacho Libre","National Lampoons Christmas Vacation","Natural Born Killers","Need for Speed","Next","Nine Months","Oblivion","Oceans Eleven","Once Upon a Time in Venice","Orange County","Our Family Wedding","Out of the Furnace","Outbreak","Pacific Rim","Pacific Rim Uprising","Pain and Gain","Passengers","Pirates of the Caribbean Dead Men Tell No Tales","Pirates of the Caribbean On Stranger Tides","Point Break","Pompeii","Predator","Predators","Priest","Psych 9","Rain Man","Rambo","Rambo Last Blood","Rampage","Rampart","Ready Player One","Reservoir Dogs","Revenge of the Nerds","Ride Along","Ride Along 2","Risky Business","Road House","Robin Hood","Rogue One","Rush Hour","Rush Hour 2","Safe House","Savages","Scarface","School of Rock","Seventh Son","Sex Tape","Shallow Hal","Shanghai Knights","Shanghai Noon","Sherlock Holmes A Game of Shadows","Snow White and the Huntsman","Solo A Star Wars Story","Spaceballs","Speed","Star Wars The Force Awakens","Star Wars The Last Jedi","Super 8","Super Troopers","Super Troopers 2","Survival of the Dead","Tag","Taken","Talladega Nights","Tammy","Ted","Tenet","Terminator Genisys","Texas Chainsaw Massacre","The A-Team","The Accountant","The Aviator","The Breakfast Club","The Bucket List","The Client","The Dark Knight Rises","The Day After Tomorrow","The Dead Girl","The Dukes of Hazard","The Equalizer","The Expendables 3","The Fast and the Furious Tokyo Drift","The Fate of the Furious","The Fighter","The Gambler","The Gentlemen","The Glass House","The Green Mile","The Grinch","The Hangover","The Hangover Part 2","The Hangover Part 3","The Heat","The House Bunny","The Hunger Games","The Hunger Games Catching Fire","The Hunger Games Mockingjay","The Hunger Games Mockingjay Pt 2","The Hungover Games","The Ideas of March","The Karate Kid","The Lego Batman Movie","The Lorax","The Losers","The Magnificent Seven","The Martian","The Mechanic","The Meg","The Monuments Men","The Mule","The Musketeer","The Never-ending Story","The Nice Guys","The Outlaw","The Outsiders","The Quest","The Quick and the Dead","The Rundown","The Shawshank Redemption","The Shining","The Silence of the Lambs","The Son of No One","The Sorcerers Apprentice","The Tax Collector","The Terminator","The Thing","The Town","The War with Grandpa","The Wolf of Wall Street","The Wolverine","The Woodsman","The Worlds End","The Wrestler","The Zodiac","Thelma and Louise","This is the End","Thor Ragnarok","Three Kings","Tinker Tailor Soldier Spy","Tomb Raider","Tower Heist","Transcendence","Transformers","Transformers The Last Knight","Trouble with the Curve","Tropic Thunder","Troy","Twister","Unforgiven","Vacation","War Dogs","Warrior","Were the Millers","Weekend at Bernies","When Harry Met Sally","White Men Cant Jump","Why Him","Wild Card","Wonder Woman","World War Z","Wyatt Earp","X-Men","X-Men Apocalypse","X-Men Last Stand","X-Men Origins Wolverine","X2","Yogi Bear","Young Guns","Zodiac"];

var DIGITAL = ["65","Airplane","Anaconda","Babylon","The Bad Guys 2","Beetlejuice","Beetlejuice Beetlejuice","Black Adam","Blade","Blade 2","Blade Trinity","Bumblebee","Casper","Civil War","Cocaine Bear","Daffy Ducks Quackbusters","Despicable Me 4","Django Unchained","Dracula Dead and Loving It","Elemental","Fatman","A Few Good Men","Final Destination","Ghost Rider","Ghost Rider Spirit of Vengeance","Gone in 60 Seconds","Indiana Jones Raiders of the Lost Ark","Indiana Jones and the Temple of Doom","Indiana Jones and the Last Crusade","Indiana Jones and the Dial of Destiny","Indiana Jones and the Kingdom of the Crystal Skull","Inside Out 2","The Italian Job","John Wick 4","Jurassic Park","Jurassic Park 3","Jurassic Park The Lost World","Jurassic World","Jurassic World Dominion","Jurassic World Fallen Kingdom","Jurassic World Rebirth","The Lego Movie","The Lego Movie The Second Part","The Lego Ninjago Movie","The Lego Batman Movie","Men in Black","Mickey 17","Mortal Kombat","Mummies","My Girl","National Lampoons Christmas Vacation","Novacaine","Odd Thomas","Scrooged","Small Soldiers","Snatch","Spider-Man No Way Home","The Legend of Sleepy Hollow","The SpongeBob Movie Sponge Out of Water","Starship Troopers","Top Gun","Top Gun Maverick","Top Secret","Transformers","Transformers Revenge of the Fallen","Transformers Dark of the Moon","Transformers Age of Extinction","Transformers The Last Knight","Transformers Rise of the Beasts","Venom The Last Dance","Violent Night","Weekend at Bernies","Zootopia 2"];

function sortArr(arr) {
  return arr.slice().sort(function(a,b) {
    var c = function(s){return s.replace(/^(The|A|An) /i,"").toLowerCase();};
    return c(a) < c(b) ? -1 : c(a) > c(b) ? 1 : 0;
  });
}

var dvdSorted = sortArr(DVD);
var digSorted = sortArr(DIGITAL);
var dvdData = dvdSorted.map(function(t,i){return {title:t,num:i+1,poster:null,tab:"dvd"};});
var digData = digSorted.map(function(t,i){return {title:t,num:i+1,poster:null,tab:"digital"};});
var currentTab = "dvd";

function lg(title) {
  var t = title.replace(/^(The|A|An) /i,"");
  return /[0-9]/.test(t[0]) ? "#" : t[0].toUpperCase();
}

function renderGrid(list, elId) {
  var el = document.getElementById(elId);
  if (!list.length) { el.innerHTML = "<div class=\"no-results\">No titles found</div>"; return; }
  var html = "", lastL = "", gridOpen = false;
  list.forEach(function(item, idx) {
    var g = lg(item.title);
    if (g !== lastL) {
      if (gridOpen) html += "</div>";
      html += "<div class=\"section-header\">" + g + "</div><div class=\"movie-grid\">";
      lastL = g; gridOpen = true;
    }
    var abbr = item.title.replace(/^(The|A|An) /i,"").substring(0,3).toUpperCase();
    var inner = item.poster
      ? "<img src=\"" + item.poster + "\" alt=\"\" loading=\"lazy\"/>"
      : "<div class=\"placeholder\"><div class=\"abbr\">" + abbr + "</div><div class=\"ptitle\">" + item.title + "</div></div>";
    html += "<div class=\"movie-card\" id=\"card-" + elId + "-" + item.num + "\" onclick=\"showDetail('" + item.tab + "'," + (item.num-1) + ")\">" +
      "<div class=\"num-badge\">" + item.num + "</div>" + inner + "</div>";
  });
  if (gridOpen) html += "</div>";
  el.innerHTML = html;
}

function filterList() {
  var q = document.getElementById("search").value.toLowerCase();
  var data = currentTab === "dvd" ? dvdData : digData;
  var elId = currentTab === "dvd" ? "list-dvd" : "list-digital";
  var filtered = q ? data.filter(function(d){return d.title.toLowerCase().indexOf(q) > -1;}) : data.slice();
  renderGrid(filtered, elId);
  document.getElementById("stats").textContent = "Showing " + filtered.length + " of " + data.length + " titles";
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});
  document.querySelectorAll(".tab-content").forEach(function(t){t.classList.remove("active");});
  document.querySelector("[onclick=\"switchTab('" + tab + "')\"]").classList.add("active");
  document.getElementById("tab-" + tab).classList.add("active");
  document.getElementById("search").value = "";
  var data = tab === "dvd" ? dvdData : digData;
  document.getElementById("stats").textContent = data.length + " titles";
}

function showDetail(tab, index) {
  var item = tab === "dvd" ? dvdData[index] : digData[index];
  document.getElementById("modal-title").textContent = item.title;
  document.getElementById("modal-year").textContent = "";
  document.getElementById("modal-score").textContent = "";
  document.getElementById("modal-overview").textContent = "Loading...";
  document.getElementById("modal-tags").innerHTML = "";
  document.getElementById("modal-backdrop").src = "";
  document.getElementById("modal-poster").innerHTML = "";
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";

  var query = item.title.replace(/^(The|A|An) /i,"").replace(/[^a-zA-Z0-9 ]/g,"").trim();
  fetch("https://api.themoviedb.org/3/search/movie?api_key=" + API + "&query=" + encodeURIComponent(query) + "&language=en-US&page=1")
  .then(function(r){return r.json();})
  .then(function(d) {
    if (d.results && d.results.length > 0) {
      var m = d.results[0];
      document.getElementById("modal-title").textContent = m.title || item.title;
      document.getElementById("modal-year").textContent = m.release_date ? m.release_date.substring(0,4) : "";
      document.getElementById("modal-score").textContent = m.vote_average ? "★ " + m.vote_average.toFixed(1) : "";
      document.getElementById("modal-overview").textContent = m.overview || "No synopsis available.";
      if (m.backdrop_path) {
        document.getElementById("modal-backdrop").src = IMG + "w780" + m.backdrop_path;
      }
      if (m.poster_path) {
        document.getElementById("modal-poster").innerHTML = "<img src=\"" + IMG + "w185" + m.poster_path + "\" alt=\"\"/>";
        item.poster = IMG + "w185" + m.poster_path;
        var elId = tab === "dvd" ? "list-dvd" : "list-digital";
        var card = document.getElementById("card-" + elId + "-" + item.num);
        if (card) {
          var badge = "<div class=\"num-badge\">" + item.num + "</div>";
          card.innerHTML = badge + "<img src=\"" + item.poster + "\" alt=\"\" loading=\"lazy\"/>";
        }
      }
      return fetch("https://api.themoviedb.org/3/movie/" + m.id + "?api_key=" + API);
    }
  })
  .then(function(r){if(r)return r.json();})
  .then(function(d) {
    if (d && d.genres && d.genres.length) {
      var tags = d.genres.map(function(g){return "<span class=\"modal-tag\">" + g.name + "</span>";}).join("");
      document.getElementById("modal-tags").innerHTML = tags;
    }
  })
  .catch(function() {
    document.getElementById("modal-overview").textContent = "Could not load movie details.";
  });
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

renderGrid(dvdData, "list-dvd");
renderGrid(digData, "list-digital");
document.getElementById("stats").textContent = dvdData.length + " titles";

function loadPosters(data, elId) {
  var i = 0;
  function next() {
    if (i >= data.length) return;
    var item = data[i++];
    if (item.poster) { setTimeout(next, 50); return; }
    var q = item.title.replace(/^(The|A|An) /i,"").replace(/[^a-zA-Z0-9 ]/g,"").trim();
    fetch("https://api.themoviedb.org/3/search/movie?api_key=" + API + "&query=" + encodeURIComponent(q) + "&language=en-US&page=1")
    .then(function(r){return r.json();})
    .then(function(d) {
      if (d.results && d.results.length > 0 && d.results[0].poster_path) {
        item.poster = IMG + "w185" + d.results[0].poster_path;
        var card = document.getElementById("card-" + elId + "-" + item.num);
        if (card) {
          card.innerHTML = "<div class=\"num-badge\">" + item.num + "</div><img src=\"" + item.poster + "\" alt=\"\" loading=\"lazy\"/>";
          card.setAttribute("onclick","showDetail('" + item.tab + "'," + (item.num-1) + ")");
        }
      }
    })
    .catch(function(){})
    .then(function(){setTimeout(next,80);});
  }
  next();
}

loadPosters(dvdData, "list-dvd");
loadPosters(digData, "list-digital");
</script>
</body>
</html>
