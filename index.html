let dvdData=[], digData=[], currentTab="dvd", currentModalItem=null, selectedLib="dvd", selectedAddMovie=null, addTimer=null, selectedType="movie", aiLib="all";
let fbDvdAdded=[], fbDvdDeleted=[], fbDigAdded=[], fbDigDeleted=[];

function sortArr(arr){return arr.slice().sort((a,b)=>{const c=s=>(s.title||s).replace(/^(The|A|An) /i,"").toLowerCase();return c(a)<c(b)?-1:c(a)>c(b)?1:0;});}
function lgr(title){const t=title||"";return /[0-9]/.test(t[0])?"#":t[0].toUpperCase();}
function mkId(t){return t.replace(/[^a-zA-Z0-9]/g,"_");}

function renderGrid(list,elId){
  const el=document.getElementById(elId);
  if(!list.length){el.innerHTML='<div class="no-results">No titles found</div>';return;}
  const groups={};
  list.forEach(item=>{const g=lgr(item.title);if(!groups[g])groups[g]=[];groups[g].push(item);});
  const order=Object.keys(groups).sort((a,b)=>{if(a==="#")return -1;if(b==="#")return 1;return a.localeCompare(b);});
  let html="";
  order.forEach(g=>{
    html+='<div class="section-header">'+g+'</div><div class="movie-grid">';
    groups[g].forEach(item=>{
      const abbr=item.title.substring(0,3).toUpperCase();
      const inner=item.poster?'<img src="'+item.poster+'" alt="" loading="lazy"/>':'<div class="placeholder"><div class="abbr">'+abbr+'</div><div class="ptitle">'+item.title+'</div></div>';
      const nb=item.custom?'<div class="new-badge">NEW</div>':'';
      const tvb=item.type==="tv"?'<div class="tv-card-badge">TV</div>':'';
      html+='<div class="movie-card" id="card-'+elId+'-'+item.id+'" data-tab="'+item.tab+'" data-id="'+item.id+'" onclick="showDetail(this.dataset.tab,this.dataset.id)"><div class="num-badge">'+item.num+'</div>'+nb+tvb+inner+'</div>';
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

function rebuild(){
  const dvdTitles=DVD_BASE.filter(b=>!fbDvdDeleted.includes(b.title));
  let dvdAll=[...dvdTitles];
  fbDvdAdded.forEach(item=>dvdAll.push({title:item.title,poster:item.poster||null,custom:true,tab:"dvd",_docId:item._docId,tmdbId:item.tmdbId,type:item.type||"movie"}));
  dvdAll=sortArr(dvdAll);
  dvdData=dvdAll.map((item,i)=>({...item,tab:"dvd",num:i+1,id:mkId(item.title)}));
  const digTitles=DIG_BASE.filter(b=>!fbDigDeleted.includes(b.title));
  let digAll=[...digTitles];
  fbDigAdded.forEach(item=>digAll.push({title:item.title,poster:item.poster||null,custom:true,tab:"digital",_docId:item._docId,tmdbId:item.tmdbId,type:item.type||"movie"}));
  digAll=sortArr(digAll);
  digData=digAll.map((item,i)=>({...item,tab:"digital",num:i+1,id:mkId(item.title)}));
  renderGrid(dvdData,"list-dvd");
  renderGrid(digData,"list-digital");
  const currentData=currentTab==="dvd"?dvdData:digData;
  if(document.getElementById("stats")) document.getElementById("stats").textContent=currentData.length+" titles";
  loadPosters(dvdData,"list-dvd");
  loadPosters(digData,"list-digital");
}

onSnapshot(collection(db,"dvd_added"),snap=>{fbDvdAdded=snap.docs.map(d=>({...d.data(),_docId:d.id}));rebuild();});
onSnapshot(collection(db,"dvd_deleted"),snap=>{fbDvdDeleted=snap.docs.map(d=>d.data().title);rebuild();});
onSnapshot(collection(db,"digital_added"),snap=>{fbDigAdded=snap.docs.map(d=>({...d.data(),_docId:d.id}));rebuild();});
onSnapshot(collection(db,"digital_deleted"),snap=>{fbDigDeleted=snap.docs.map(d=>d.data().title);rebuild();});

function loadPosters(data,elId){
  let i=0;
  function next(){
    if(i>=data.length)return;
    const item=data[i++];
    if(item.poster){setTimeout(next,30);return;}
    const q=item.title.replace(/^(The|A|An) /i,"").replace(/[^a-zA-Z0-9 ]/g,"").trim();
    const ep=item.type==="tv"?"search/tv":"search/movie";
    fetch("https://api.themoviedb.org/3/"+ep+"?api_key="+TMDB+"&query="+encodeURIComponent(q))
    .then(r=>r.json()).then(d=>{
      if(d.results&&d.results.length>0&&d.results[0].poster_path){
        item.poster=IMG+"w185"+d.results[0].poster_path;
        const card=document.getElementById("card-"+elId+"-"+item.id);
        if(card){
          const nb=item.custom?'<div class="new-badge">NEW</div>':'';
          const tvb=item.type==="tv"?'<div class="tv-card-badge">TV</div>':'';
          card.innerHTML='<div class="num-badge">'+item.num+'</div>'+nb+tvb+'<img src="'+item.poster+'" alt=""/>';
        }
      }
    }).catch(()=>{}).then(()=>setTimeout(next,80));
  }
  next();
}

window.switchTab=function(tab){
  currentTab=tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  const tabs=["dvd","digital","add","ai"];
  document.querySelectorAll(".tab")[tabs.indexOf(tab)].classList.add("active");
  document.getElementById("tab-"+tab).classList.add("active");
  const hide=tab==="add"||tab==="ai";
  document.getElementById("search-wrap").style.display=hide?"none":"flex";
  document.getElementById("stats").style.display=hide?"none":"block";
  if(!hide){document.getElementById("search").value="";const data=tab==="dvd"?dvdData:digData;document.getElementById("stats").textContent=data.length+" titles";}
};

window.clearSearch=function(){document.getElementById("search").value="";filterList();};
window.filterList=function(){
  const q=document.getElementById("search").value.toLowerCase();
  const data=currentTab==="dvd"?dvdData:digData;
  const elId=currentTab==="dvd"?"list-dvd":"list-digital";
  const filtered=q?data.filter(d=>d.title.toLowerCase().includes(q)):data.slice();
  renderGrid(filtered,elId);
};

window.showDetail=function(tab,id){
  const data=tab==="dvd"?dvdData:digData;
  const item=data.find(d=>d.id===id);
  if(!item)return;
  currentModalItem=item;
  document.getElementById("modal-title").textContent=item.title;
  document.getElementById("modal-overview").textContent="Loading...";
  document.getElementById("modal-tags").innerHTML="";
  document.getElementById("modal-backdrop").src="";
  document.getElementById("modal").classList.add("open");
  const q=item.title.replace(/^(The|A|An) /i,"").replace(/[^a-zA-Z0-9 ]/g,"").trim();
  const ep=item.type==="tv"?"search/tv":"search/movie";
  fetch("https://api.themoviedb.org/3/"+ep+"?api_key="+TMDB+"&query="+encodeURIComponent(q))
  .then(r=>r.json()).then(d=>{
    if(d.results&&d.results.length>0){
      const m=d.results[0];
      document.getElementById("modal-overview").textContent=m.overview||"No synopsis.";
      if(m.backdrop_path)document.getElementById("modal-backdrop").src=IMG+"w780"+m.backdrop_path;
      if(m.poster_path)document.getElementById("modal-poster").innerHTML='<img src="'+IMG+"w185"+m.poster_path+'" alt=""/>';
    }
  });
};

window.closeModal=function(){document.getElementById("modal").classList.remove("open");currentModalItem=null;};

window.deleteCurrentMovie=function(){
  if(!currentModalItem)return;
  const item=currentModalItem;
  if(!confirm('Remove "'+item.title+'"?'))return;
  const colName=item.tab==="dvd"?(item.custom?"dvd_added":"dvd_deleted"):(item.custom?"digital_added":"digital_deleted");
  if(item.custom) deleteDoc(doc(db,colName,item._docId)).then(()=>closeModal());
  else setDoc(doc(db,colName,mkId(item.title)),{title:item.title}).then(()=>closeModal());
};

window.searchForAdd=function(){
  clearTimeout(addTimer);
  const q=document.getElementById("add-search").value.trim();
  if(q.length<2)return;
  addTimer=setTimeout(()=>{
    const ep=selectedType==="tv"?"search/tv":"search/movie";
    fetch("https://api.themoviedb.org/3/"+ep+"?api_key="+TMDB+"&query="+encodeURIComponent(q))
    .then(r=>r.json()).then(d=>{
      let html="";
      d.results.slice(0,5).forEach(m=>{
        const tk=selectedType==="tv"?"name":"title";
        const mStr=JSON.stringify({id:m.id,title:m[tk],poster_path:m.poster_path,type:selectedType}).replace(/"/g,"&quot;");
        html+='<div class="search-result-item" onclick="selectAddMovie(JSON.parse(this.dataset.m))" data-m="'+mStr+'"><div class="sri-title">'+m[tk]+'</div></div>';
      });
      document.getElementById("add-results").innerHTML=html;
    });
  },400);
};

window.selectAddMovie=function(m){
  selectedAddMovie=m;
  document.getElementById("add-search").value=m.title;
  document.getElementById("add-results").innerHTML="";
  document.getElementById("add-btn").disabled=false;
};

window.addTitle=function(){
  const colName=selectedLib==="dvd"?"dvd_added":"digital_added";
  const poster=selectedAddMovie.poster_path?IMG+"w185"+selectedAddMovie.poster_path:null;
  setDoc(doc(db,colName,mkId(selectedAddMovie.title)+"_"+selectedAddMovie.id),{title:selectedAddMovie.title,poster:poster,tmdbId:selectedAddMovie.id,type:selectedAddMovie.type})
  .then(()=>{
    const res=document.getElementById("add-result");
    res.className="add-result success";
    res.textContent="Added!";
    setTimeout(()=>res.style.display="none",2000);
  });
};

window.selectType=t=>{selectedType=t;document.getElementById("type-movie").classList.toggle("selected",t==="movie");document.getElementById("type-tv").classList.toggle("selected",t==="tv");};
window.selectLib=l=>{selectedLib=l;document.getElementById("lib-dvd").classList.toggle("selected",l==="dvd");document.getElementById("lib-digital").classList.toggle("selected",l==="digital");};
window.selectAiLib=l=>{aiLib=l;document.getElementById("ai-lib-all").classList.toggle("selected",l==="all");document.getElementById("ai-lib-dvd").classList.toggle("selected",l==="dvd");document.getElementById("ai-lib-digital").classList.toggle("selected",l==="digital");};

// ERROR-PROOF GEMINI LOGIC
window.askGemini = async function() {
  const promptEl = document.getElementById("ai-prompt");
  const resultEl = document.getElementById("ai-result");
  const btn = document.getElementById("ai-btn");
  const prompt = promptEl.value.trim();
  if (!prompt) { alert("Describe what you're in the mood for!"); return; }

  btn.disabled = true; 
  btn.textContent = "Thinking...";
  resultEl.innerHTML = '<div class="ai-thinking">Gemini is searching your collection...</div>';

  const allTitles = aiLib === "dvd" ? dvdData : aiLib === "digital" ? digData : [...dvdData, ...digData];
  const titleList = allTitles.map(t => t.title + " (" + t.tab + ")").join(", ");
  
  const gPrompt = `You are a movie recommendation assistant. The user has these titles: ${titleList}. User says: "${prompt}". Suggest up to 5 titles from their collection only. Return ONLY a raw JSON object, no markdown, no backticks: {"suggestions":[{"title":"exact title","reason":"one sentence","library":"dvd or digital"}]}`;

  try {
    // UPDATED ENDPOINT TO V1 AND FIXED MODEL NAME
    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GEMINI}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ contents: [{ parts: [{ text: gPrompt }] }] })
    });

    const data = await res.json();

    if (data.error) {
      throw new Error(`Google API Error: ${data.error.message}`);
    }

    if (!data.candidates || !data.candidates[0] || !data.candidates[0].content) {
      throw new Error("Invalid API response. Check your API key or quota.");
    }

    let text = data.candidates[0].content.parts[0].text;
    const cleanJson = text.replace(/```json/g, "").replace(/```/g, "").trim();
    const parsed = JSON.parse(cleanJson);
    const suggestions = parsed.suggestions || [];

    if (!suggestions.length) {
      resultEl.innerHTML = '<div class="ai-thinking">No matches found. Try a different description!</div>';
    } else {
      let html = "";
      suggestions.forEach(s => {
        const found = allTitles.find(t => t.title.toLowerCase() === s.title.toLowerCase());
        const poster = found && found.poster ? `<img src="${found.poster}"/>` : `<div class="ai-poster-ph">${s.title.substring(0,3).toUpperCase()}</div>`;
        const ftab = found ? found.tab : s.library;
        const fid = found ? found.id : '';
        html += `<div class="ai-card" onclick="showDetail('${ftab}','${fid}')">${poster}<div><div class="ai-title">${s.title}</div><div class="ai-reason">${s.reason}</div><div class="ai-lib">${ftab.toUpperCase()}</div></div></div>`;
      });
      resultEl.innerHTML = html;
    }
  } catch (e) {
    resultEl.innerHTML = `<div class="ai-thinking" style="color:#e50914">Error: ${e.message}. Try again!</div>`;
    console.error("Gemini error:", e);
  } finally {
    btn.disabled = false; 
    btn.textContent = "Ask Gemini";
  }
};
</script>
