<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Movie Deluxe</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;padding-bottom:50px}
.header{background:#111;padding:16px 16px 0;position:sticky;top:0;z-index:100;border-bottom:1px solid #222}
.header h1{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:12px}
.tabs{display:flex;gap:0}
.tab{flex:1;padding:12px 0;text-align:center;font-size:13px;font-weight:600;color:#666;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#fff;border-bottom-color:#e50914}
.search-wrap{padding:12px 16px;background:#0a0a0a;position:sticky;top:107px;z-index:99;display:flex;gap:8px}
.search-wrap input{flex:1;padding:12px;font-size:16px;border:none;border-radius:8px;background:#1e1e1e;color:#fff;outline:none}
.home-btn{width:44px;background:#1e1e1e;border:none;border-radius:8px;color:#888;font-size:20px}
.tab-content{display:none;padding:0 16px}
.tab-content.active{display:block}
.movie-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:10px}
.movie-card{border-radius:8px;overflow:hidden;background:#1a1a1a;aspect-ratio:2/3;position:relative;display:flex;align-items:center;justify-content:center;text-align:center;border:1px solid #333;font-size:11px;color:#888;padding:10px;cursor:pointer}
.movie-card img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;padding:40px 20px;overflow-y:auto}
.modal-content{background:#1a1a1a;padding:25px;border-radius:15px;max-width:400px;margin:auto;border:1px solid #444;text-align:center}
.ai-card{background:#1a1a1a;border-radius:10px;padding:15px;margin-bottom:12px;border:1px solid #333;border-left:4px solid #e50914;text-align:left}
.btn-row{display:flex;gap:10px;justify-content:center;margin-top:20px}
.action-btn{padding:10px 15px;border-radius:6px;border:none;font-weight:bold;font-size:12px;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <h1>Movie Deluxe</h1>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('dvd')">DVD</div>
    <div class="tab" onclick="switchTab('digital')">Digital</div>
    <div class="tab" onclick="switchTab('add')">+ Add</div>
    <div class="tab" onclick="switchTab('ai')">Ask AI</div>
  </div>
</div>

<div class="search-wrap" id="search-box">
  <input type="search" id="main-search" placeholder="Search collection..." oninput="renderAll()"/>
  <button class="home-btn" onclick="location.reload()">&#8962;</button>
</div>

<div id="tab-dvd" class="tab-content active"><div class="movie-grid" id="grid-dvd"></div></div>
<div id="tab-digital" class="tab-content"><div class="movie-grid" id="grid-digital"></div></div>

<div id="movie-modal" class="modal" onclick="this.style.display='none'">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div id="modal-poster-space" style="margin-bottom:15px"></div>
    <h2 id="modal-title" style="color:#e50914;margin-bottom:10px"></h2>
    <p id="modal-summary" style="font-size:14px;color:#bbb;line-height:1.6"></p>
    <div class="btn-row">
      <button id="fetch-btn" class="action-btn" style="background:#e50914;color:white">Get Movie Info</button>
      <button id="del-btn" class="action-btn" style="background:#333;color:#ff4444">Delete</button>
    </div>
  </div>
</div>

<div id="tab-add" class="tab-content">
  <div style="padding:20px 0">
    <input type="text" id="new-title" style="width:100%;padding:15px;background:#1e1e1e;color:#fff;border:1px solid #333;border-radius:8px;margin-bottom:10px" placeholder="Enter Movie Name..."/>
    <select id="new-type" style="width:100%;padding:15px;background:#1e1e1e;color:#fff;border:1px solid #333;border-radius:8px;margin-bottom:15px">
      <option value="dvd">DVD</option>
      <option value="digital">Digital</option>
    </select>
    <button onclick="searchAndSave()" style="width:100%;padding:18px;background:#e50914;color:#fff;font-weight:bold;border:none;border-radius:8px">Search & Add</button>
  </div>
</div>

<div id="tab-ai" class="tab-content">
  <div style="padding:20px 0">
    <textarea id="ai-prompt" style="width:100%;height:100px;padding:15px;background:#1e1e1e;color:#fff;border:1px solid #333;border-radius:8px;margin-bottom:10px;resize:none" placeholder="What kind of movie?"></textarea>
    <button id="ai-btn" onclick="askGemini()" style="width:100%;padding:18px;background:#e50914;color:#fff;font-weight:bold;border:none;border-radius:8px">Ask Gemini</button>
    <div id="ai-result" style="margin-top:20px"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const TMDB_KEY = "8670d5dc76f371b2ad77f98e626dfba2";
const GEMINI_KEY = "AQ.Ab8RN6LIAHe_pUU_VinBWJM50ft4XQEKtx_KvpeS1plvYPCXag";
const firebaseConfig = { apiKey: "AIzaSyBBKgF3BXF3WOrVATkyH-ZR296KbPPG6m0", authDomain: "my-movie-catalog-2acdc.firebaseapp.com", projectId: "my-movie-catalog-2acdc", storageBucket: "my-movie-catalog-2acdc.firebasestorage.app", appId: "1:653525309773:web:d931c15ce41e6673f37f04" };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let fbMovies = [];
const DVD_BASE = ["21","22 Jump Street","Alien","Avatar"].map(t=>({title:t, type:'dvd'})); // Simplified for example
const DIG_BASE = ["65","Airplane","Beetlejuice"].map(t=>({title:t, type:'digital'}));

onSnapshot(collection(db, "movies"), (snap) => {
  fbMovies = snap.docs.map(d => ({id: d.id, ...d.data()}));
  renderAll();
});

window.renderAll = () => {
  const q = document.getElementById('main-search').value.toLowerCase();
  const all = [...DVD_BASE, ...DIG_BASE, ...fbMovies];
  const filtered = all.filter(m => m.title.toLowerCase().includes(q)).sort((a,b)=>a.title.localeCompare(b.title));
  
  document.getElementById('grid-dvd').innerHTML = filtered.filter(m=>m.type==='dvd').map(m=>renderCard(m)).join('');
  document.getElementById('grid-digital').innerHTML = filtered.filter(m=>m.type==='digital').map(m=>renderCard(m)).join('');
};

function renderCard(m) {
  const mJson = JSON.stringify(m).replace(/'/g, "&apos;");
  return `<div class="movie-card" onclick='openInfo(${mJson})'>
    ${m.poster ? `<img src="https://image.tmdb.org/t/p/w200${m.poster}">` : `<span>${m.title}</span>`}
  </div>`;
}

window.openInfo = (movie) => {
  document.getElementById('modal-title').innerText = movie.title;
  document.getElementById('modal-summary').innerText = movie.overview || "No summary found yet.";
  document.getElementById('modal-poster-space').innerHTML = movie.poster ? `<img src="https://image.tmdb.org/t/p/w300${movie.poster}" style="width:150px;border-radius:8px">` : "";
  
  const fetchBtn = document.getElementById('fetch-btn');
  const delBtn = document.getElementById('del-btn');

  // If it's a new movie from Firebase, show delete. If it's a base movie, show Fetch Info.
  fetchBtn.onclick = () => autoFetch(movie.title, movie.type);
  
  if(movie.id) {
    delBtn.style.display = 'block';
    delBtn.onclick = async () => { if(confirm("Delete?")) await deleteDoc(doc(db, "movies", movie.id)); };
  } else {
    delBtn.style.display = 'none';
  }
  document.getElementById('movie-modal').style.display = 'block';
};

async function autoFetch(title, type) {
  try {
    const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}`);
    const data = await res.json();
    const m = data.results[0];
    if(m) {
      await setDoc(doc(db, "movies", m.id.toString()), { title: m.title, poster: m.poster_path, type: type, overview: m.overview });
      alert("Summary & Poster Pulled!");
      document.getElementById('movie-modal').style.display = 'none';
    }
  } catch(e) { alert("Error fetching info"); }
}

window.searchAndSave = async () => {
  const title = document.getElementById('new-title').value.trim();
  const type = document.getElementById('new-type').value;
  if(!title) return;
  await autoFetch(title, type);
  document.getElementById('new-title').value = "";
};

window.switchTab = (t) => {
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', ['dvd','digital','add','ai'][i] === t));
  document.querySelectorAll('.tab-content').forEach(el => el.classList.toggle('active', el.id === 'tab-'+t));
  document.getElementById('search-box').style.display = (t==='add'||t==='ai') ? 'none' : 'flex';
};

window.askGemini = async function() {
  const p = document.getElementById("ai-prompt").value;
  const resEl = document.getElementById("ai-result");
  const btn = document.getElementById("ai-btn");
  if(!p) return;
  btn.disabled = true; resEl.innerHTML = "Thinking...";
  const titles = [...DVD_BASE, ...DIG_BASE, ...fbMovies].map(m=>m.title).join(", ");
  const gPrompt = `Based on this list: ${titles}, suggest 3 movies for: "${p}". Return ONLY JSON: {"suggestions":[{"title":"Name","reason":"Why"}]}`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ contents: [{ parts: [{ text: gPrompt }] }] })
    });
    const data = await res.json();
    const json = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));
    resEl.innerHTML = json.suggestions.map(s => `<div class="ai-card"><div style="font-weight:800;color:#e50914">${s.title}</div><div style="font-size:13px;color:#bbb">${s.reason}</div></div>`).join('');
  } catch(e) { resEl.innerHTML = `<div style="color:red">Error: ${e.message}</div>`; } finally { btn.disabled = false; }
};
renderAll();
</script>
</body>
</html>
