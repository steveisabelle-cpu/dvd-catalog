<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>My DVDs</title>
<style>
body{margin:0;font-family:-apple-system,sans-serif;background:#f2f2f7}
header{background:#fff;padding:12px 16px;position:sticky;top:0;border-bottom:1px solid #ddd;z-index:10}
h1{font-size:17px;font-weight:700;margin:0 0 8px}
input{width:100%;padding:8px 12px;font-size:16px;border:1px solid #ccc;border-radius:8px;background:#f2f2f7;box-sizing:border-box;-webkit-appearance:none}
#stats{font-size:12px;color:#999;margin-top:6px}
.sh{background:#f2f2f7;padding:6px 16px;font-size:12px;font-weight:700;color:#888;text-transform:uppercase;border-bottom:1px solid #e0e0e0}
.row{display:flex;align-items:center;padding:8px 16px;background:#fff;border-bottom:1px solid #f0f0f0;min-height:68px;gap:12px}
.num{font-size:11px;color:#bbb;width:28px;text-align:right;flex-shrink:0}
.pt{width:40px;height:60px;border-radius:5px;background:#e8e8e8;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pt img{width:40px;height:60px;object-fit:cover;display:block}
.pp{font-size:8px;color:#bbb;text-align:center;font-weight:700;padding:2px}
.ti{font-size:15px;color:#111;flex:1;line-height:1.3}
.nr{padding:40px;text-align:center;color:#aaa}
@media(prefers-color-scheme:dark){
body{background:#1c1c1e}
header{background:#2c2c2e;border-bottom-color:#3a3a3c}
input{background:#3a3a3c;color:#fff;border-color:#3a3a3c}
.sh{background:#1c1c1e;color:#888;border-bottom-color:#2c2c2e}
.row{background:#2c2c2e;border-bottom-color:#3a3a3c}
.pt{background:#3a3a3c}
.ti{color:#fff}}
</style>
</head>
<body>
<header>
<h1>My DVD Collection</h1>
<input type="search" id="s" placeholder="Search..." oninput="go()" autocorrect="off" autocapitalize="off" spellcheck="false"/>
<div id="stats"></div>
</header>
<div id="out"></div>
<script>
var API='8670d5dc76f371b2ad77f98e626dfba2';
var T=["11.22.63","21","21 and Over","22 Jump Street","2012","30 Minutes or Less","50 First Dates","A Christmas Story","A Fistful of Dollars","A Million Ways to Die in the West","A Walk Among the Tombstones","Abraham Lincoln Vampire Hunter","Ad Astra","After Earth","Alien","Alien Covenant","Alien vs Predator","Aliens","American Gangster","American History X","American Hustle","American Pie","Annihilation","Ant-Man and the Wasp","Apollo 18","Aquaman","Austin Powers Goldmember","Avengers Age of Ultron","Avengers Endgame","Avatar","Batman vs Superman","Battleship","Baywatch","Bee Movie","Big Trouble in Little China","Bill and Ted's Bogus Journey","Bill and Ted's Excellent Adventure","Black Panther","Blade Runner","Bleeding Steel","Blended","Bloodshot","Blow","Boondock Saints","Brave","Bumblebee","Captain America The First Avenger","Captain America The Winter Soldier","Cast Away","Central Intelligence","Chicago","Chips","Civil War","Clash of the Titans","Cold Mountain","Collateral","Collateral Damage","Conan the Barbarian","Conan the Destroyer","Constantine","Contraband","Dawn of the Dead","Deadpool 2","Deliver Us","Despicable Me","Despicable Me 2","Despicable Me 3","Die Hard","Die Hard with a Vengeance","Dirty Grandpa","Divergent","Doctor Strange","Dolittle","Dragonheart","Due Date","Edward Scissorhands","Enemy of the State","Escape Plan","Eurotrip","Everything Must Go","Fantastic Beasts and Where to Find Them","Fantastic Beasts The Crimes of Grindelwald","Fast 5","Fast 6","Fast and Furious Hobbs and Shaw","Fast Times at Ridgemont High","Faster","Fear and Loathing in Las Vegas","Fight Club","First Man","Full Metal Jacket","Furious 7","G.I. Joe","Game Night","Gamer","Get Hard","Ghost in the Shell","Ghost Protocol","Godzilla","Gone in 60 Seconds","Goodfellas","Goon","Gravity","Groundhog Day","Grown Ups 2","Guardians of the Galaxy Vol 2","Hannibal","Happy Feet","Heartbreak Ridge","Hell Ride","Hercules","Herbie","Hitch","Homefront","Horrible Bosses","I Am Legend","Ice Age","Ice Age The Meltdown","Identity Thief","Immortals","Independence Day","Insurgent","Iron Man 3","J. Edgar","Jack Reacher","Jack Reacher Never Go Back","Jason Bourne","Jayne Mansfield's Car","Jeepers Creepers","Joe Dirt","John Wick","John Wick 2","John Wick 3","Jonah Hex","Jumanji","Jumanji Welcome to the Jungle","Jurassic World","Just Friends","Justice League","JW Fallen Kingdom","Kick-Ass","Kick-Ass 2","Kill Bill Vol 1","Kill Bill Vol 2","Kingsman Secret Service","Kiss the Girls","Last Knights","Leatherheads","Lethal Weapon","Lethal Weapon 2","Lethal Weapon 3","Lethal Weapon 4","Little Nicky","Logan","Lone Survivor","Mad Max Fury Road","Masterminds","Mechanic Resurrection","Men in Black","Million Dollar Baby","Mission Impossible","Mission Impossible Fallout","Mission Impossible Rogue Nation","Mr and Mrs Smith","Mrs Doubtfire","My Cousin Vinny","Nacho Libre","National Lampoons Christmas Vacation","Natural Born Killers","Need for Speed","Next","Nine Months","Oblivion","Oceans Eleven","Once Upon a Time in Venice","Orange County","Our Family Wedding","Out of the Furnace","Outbreak","Pacific Rim","Pacific Rim Uprising","Pain and Gain","Passengers","Pirates of the Caribbean Dead Men Tell No Tales","Pirates of the Caribbean On Stranger Tides","Point Break","Pompeii","Predator","Predators","Priest","Psych 9","Rain Man","Rambo","Rambo Last Blood","Rampage","Rampart","Ready Player One","Reservoir Dogs","Revenge of the Nerds","Ride Along","Ride Along 2","Risky Business","Road House","Robin Hood","Rogue One","Rush Hour","Rush Hour 2","Safe House","Savages","Scarface","School of Rock","Seventh Son","Sex Tape","Shallow Hal","Shanghai Knights","Shanghai Noon","Sherlock Holmes A Game of Shadows","Snow White and the Huntsman","Solo A Star Wars Story","Spaceballs","Speed","Star Wars The Force Awakens","Star Wars The Last Jedi","Super 8","Super Troopers","Super Troopers 2","Survival of the Dead","Tag","Taken","Talladega Nights","Tammy","Ted","Tenet","Terminator Genisys","Texas Chainsaw Massacre","The A-Team","The Accountant","The Aviator","The Breakfast Club","The Bucket List","The Client","The Dark Knight Rises","The Day After Tomorrow","The Dead Girl","The Dukes of Hazard","The Equalizer","The Expendables 3","The Fast and the Furious Tokyo Drift","The Fate of the Furious","The Fighter","The Gambler","The Gentlemen","The Glass House","The Green Mile","The Grinch","The Hangover","The Hangover Part 2","The Hangover Part 3","The Heat","The House Bunny","The Hunger Games","The Hunger Games Catching Fire","The Hunger Games Mockingjay","The Hunger Games Mockingjay Pt 2","The Hungover Games","The Ideas of March","The Karate Kid","The Lego Batman Movie","The Lorax","The Losers","The Magnificent Seven","The Martian","The Mechanic","The Meg","The Monuments Men","The Mule","The Musketeer","The Never-ending Story","The Nice Guys","The Outlaw","The Outsiders","The Quest","The Quick and the Dead","The Rundown","The Shawshank Redemption","The Shining","The Silence of the Lambs","The Son of No One","The Sorcerer's Apprentice","The Tax Collector","The Terminator","The Thing","The Town","The War with Grandpa","The Wolf of Wall Street","The Wolverine","The Woodsman","The World's End","The Wrestler","The Zodiac","Thelma and Louise","This is the End","Thor Ragnarok","Three Kings","Tinker Tailor Soldier Spy","Tomb Raider","Tower Heist","Transcendence","Transformers","Transformers The Last Knight","Trouble with the Curve","Tropic Thunder","Troy","Twister","Unforgiven","Vacation","War Dogs","Warrior","We're the Millers","Weekend at Bernie's","When Harry Met Sally","White Men Can't Jump","Why Him","Wild Card","Wonder Woman","World War Z","Wyatt Earp","X-Men","X-Men Apocalypse","X-Men Last Stand","X-Men Origins Wolverine","X2","Yogi Bear","Young Guns","Zodiac"];
T.sort(function(a,b){var c=function(s){return s.replace(/^(The|A|An) /i,'').toLowerCase();};return c(a)<c(b)?-1:c(a)>c(b)?1:0;});
var D=T.map(function(t,i){return {t:t,n:i+1,p:null};});

function lg(t){var c=t.replace(/^(The|A|An) /i,’’)[0].toUpperCase();return /[0-9]/.test(c)?’#’:c;}

function show(list){
var el=document.getElementById(‘out’);
if(!list.length){el.innerHTML=’<div class="nr">No results</div>’;return;}
var h=’’,ll=’’;
for(var i=0;i<list.length;i++){
var item=list[i];
var g=lg(item.t);
if(g!==ll){h+=’<div class="sh">’+g+’</div>’;ll=g;}
var ab=item.t.replace(/^(The|A|An) /i,’’).substring(0,3).toUpperCase();
var im=item.p?’<img src="'+item.p+'" alt=""/>’:’<div class="pp">’+ab+’</div>’;
h+=’<div class="row"><span class="num">’+item.n+’</span><div class="pt" id="p'+item.n+'">’+im+’</div><span class="ti">’+item.t+’</span></div>’;
}
el.innerHTML=h;
document.getElementById(‘stats’).textContent=’Showing ‘+list.length+’ of ’+D.length;
}

function go(){
var q=document.getElementById(‘s’).value.toLowerCase();
show(q?D.filter(function(d){return d.t.toLowerCase().indexOf(q)>-1;}):D);
}

// Render list immediately
show(D);
document.getElementById(‘stats’).textContent=D.length+’ titles — loading posters…’;

// Load posters one at a time using XMLHttpRequest
var pidx=0;
function nextPoster(){
if(pidx>=D.length){
document.getElementById(‘stats’).textContent=D.length+’ titles’;
return;
}
var item=D[pidx++];
var q=item.t.replace(/^(The|A|An) /i,’’).replace(/[^a-zA-Z0-9 ]/g,’’).trim();
var xhr=new XMLHttpRequest();
xhr.open(‘GET’,‘https://api.themoviedb.org/3/search/movie?api_key=’+API+’&query=’+encodeURIComponent(q)+’&language=en-US&page=1’,true);
xhr.onload=function(){
if(xhr.status===200){
try{
var d=JSON.parse(xhr.responseText);
if(d.results&&d.results.length&&d.results[0].poster_path){
var url=‘https://image.tmdb.org/t/p/w92’+d.results[0].poster_path;
item.p=url;
var el=document.getElementById(‘p’+item.n);
if(el)el.innerHTML=’<img src="'+url+'" alt=""/>’;
}
}catch(e){}
}
setTimeout(nextPoster,100);
};
xhr.onerror=function(){setTimeout(nextPoster,100);};
xhr.send();
}

setTimeout(nextPoster,300);
</script>

</body>
</html>
